name: BijecBet
description: "Arbitrage Betting Software"
publish_to: 'none'
version: 0.5.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0
  decimal: ^3.2.1
  rational: ^2.2.3
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: ^7.2.0
  http: ^1.2.2
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  google_sign_in_all_platforms: ^2.0.2
  # Removed: msix and flutter_test (moved to dev_dependencies)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0
  msix: ^3.16.0 # Placed here as a build tool



flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  windows:
    generate: true
    icon_size: 256
  image_path: "assets/icon.png"
  web:
    generate: true

flutter_native_splash:
  color: "#0E1D30"           # background color
  image: assets/splash.png   # your logo/image (optional)
  android: true
  ios: true


msix_config:
  display_name: BijecBet
  publisher_display_name: Bijec
  identity_name: com.bijec.bijecbet
  publisher: CN=Bijec  # <--- Add this line
  msix_version: 0.5.0.0
  logo_path: assets/icon.png
  # internetClient is for web; runFullTrust is for the app to actually execute
  capabilities: internetClient, runFullTrust 
  generate_certificate: true
  install_certificate: true