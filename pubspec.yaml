name: arbitrac
description: "Arbitrage Betting Software"
publish_to: 'bijecbet.app'
version: 0.5.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0
  decimal: ^3.2.1
  rational: ^2.2.3
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: ^7.2.0
  http: ^1.2.2
  google_fonts: ^8.0.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  web:
    generate: true

flutter_native_splash:
  color: "#0E1D30"           # background color
  image: assets/splash.png   # your logo/image (optional)
  android: true
  ios: true